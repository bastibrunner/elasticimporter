apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "elastic-api-importer.fullname" . }}
  labels:
    {{- include "elastic-api-importer.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-import-job
    {{- with .Values.job.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    checksum/script: {{ .Files.Get "scripts/importer.py" | sha256sum | quote }}
    checksum/payloads: {{ toYaml .Values.apiImports | sha256sum | quote }}
    {{- if .Values.job.hook }}
    {{- toYaml .Values.job.hookAnnotations | nindent 4 }}
    {{- end }}
    {{- with .Values.job.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "elastic-api-importer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api-import-job
        {{- with .Values.job.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/script: {{ .Files.Get "scripts/importer.py" | sha256sum | quote }}
        checksum/payloads: {{ toYaml .Values.apiImports | sha256sum | quote }}
        {{- with .Values.job.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "elastic-api-importer.serviceAccountName" . }}
      restartPolicy: {{ .Values.job.restartPolicy }}
      securityContext:
        {{- toYaml .Values.job.securityContext | nindent 8 }}
      {{- with .Values.job.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.job.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.job.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: importer
          image: "{{ .Values.importer.image.repository }}:{{ .Values.importer.image.tag }}"
          imagePullPolicy: {{ .Values.importer.image.pullPolicy }}
          command: ["python", "/app/importer.py"]
          securityContext:
            {{- toYaml .Values.job.containerSecurityContext | nindent 12 }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PAYLOAD_DIR
              value: {{ .Values.importer.payloadDir | quote }}
            - name: PAYLOAD_LABEL_KEY
              value: {{ .Values.payloadLabelKey | quote }}
            - name: STATE_SECRET_NAME
              value: {{ .Values.stateSecretName | quote }}
            - name: DELETE_REMOVED
              value: {{ ternary "false" (toString .Values.importer.deleteRemoved) .Values.gitops.disableDelete | quote }}
            - name: DRY_RUN
              value: {{ .Values.importer.dryRun | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.importer.logLevel | quote }}
            - name: REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.importer.timeoutSeconds | quote }}
            - name: FORCE_DELETE_SAVED_OBJECTS
              value: {{ .Values.importer.forceDeleteSavedObjects | quote }}
            - name: VERIFY_TLS
              value: {{ .Values.connections.verifyTls | quote }}
            - name: KIBANA_URL
              value: {{ .Values.connections.kibana.url | quote }}
            - name: ELASTICSEARCH_URL
              value: {{ .Values.connections.elasticsearch.url | quote }}
            {{- if .Values.connections.kibana.caSecretName }}
            - name: KIBANA_CA_FILE
              value: "/certs/kibana/{{ .Values.connections.kibana.caKey }}"
            {{- end }}
            {{- if .Values.connections.elasticsearch.caSecretName }}
            - name: ELASTICSEARCH_CA_FILE
              value: "/certs/elasticsearch/{{ .Values.connections.elasticsearch.caKey }}"
            {{- end }}
            {{- if .Values.credentials.existingSecret }}
            - name: KIBANA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.kibanaApiKeyKey | quote }}
                  optional: true
            - name: KIBANA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.kibanaUsernameKey | quote }}
                  optional: true
            - name: KIBANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.kibanaPasswordKey | quote }}
                  optional: true
            - name: ELASTICSEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.elasticsearchApiKeyKey | quote }}
                  optional: true
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.elasticsearchUsernameKey | quote }}
                  optional: true
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.elasticsearchPasswordKey | quote }}
                  optional: true
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.apiKeyKey | quote }}
                  optional: true
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.usernameKey | quote }}
                  optional: true
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.passwordKey | quote }}
                  optional: true
            {{- end }}
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
            {{- range .Values.apiImports }}
            {{- if (default true .enabled) }}
            - name: payload-{{ include "elastic-api-importer.safeName" .name }}
              mountPath: {{ printf "%s/%s" $.Values.importer.payloadDir (include "elastic-api-importer.safeName" .name) | quote }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if .Values.connections.kibana.caSecretName }}
            - name: kibana-ca
              mountPath: /certs/kibana
              readOnly: true
            {{- end }}
            {{- if .Values.connections.elasticsearch.caSecretName }}
            - name: elasticsearch-ca
              mountPath: /certs/elasticsearch
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.job.resources | nindent 12 }}
      volumes:
        - name: script
          configMap:
            name: {{ include "elastic-api-importer.fullname" . }}-script
            defaultMode: 0444
        {{- range .Values.apiImports }}
        {{- if (default true .enabled) }}
        - name: payload-{{ include "elastic-api-importer.safeName" .name }}
          configMap:
            name: {{ include "elastic-api-importer.payloadConfigMapName" (list $ .) }}
            defaultMode: 0444
        {{- end }}
        {{- end }}
        {{- if .Values.connections.kibana.caSecretName }}
        - name: kibana-ca
          secret:
            secretName: {{ .Values.connections.kibana.caSecretName | quote }}
        {{- end }}
        {{- if .Values.connections.elasticsearch.caSecretName }}
        - name: elasticsearch-ca
          secret:
            secretName: {{ .Values.connections.elasticsearch.caSecretName | quote }}
        {{- end }}
