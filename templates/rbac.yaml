apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "elastic-api-importer.fullname" . }}
  labels:
    {{- include "elastic-api-importer.labels" . | nindent 4 }}
rules:
  # create cannot be restricted by resourceNames, but get/update/patch are restricted below.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.stateSecretName | quote }}
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "elastic-api-importer.fullname" . }}
  labels:
    {{- include "elastic-api-importer.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "elastic-api-importer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "elastic-api-importer.fullname" . }}
